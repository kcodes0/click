name = "kcodes-portal"
main = "src/index.tsx"
compatibility_date = "2026-03-28"

# Production cookie domain. The auth middleware ignores this on localhost,
# so dev still works with host-only cookies.
[vars]
COOKIE_DOMAIN = ".kcodes.me"

[[d1_databases]]
binding = "DB"
database_name = "wiki-race"
database_id = "c60569b1-2694-4486-a089-fdf8ef301f7b"

[[rules]]
type = "Data"
globs = ["**/*.woff2", "**/*.ttf"]
fallthrough = false
